services:
  - type: web
    name: hotel-booking-chatbot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT -w 1
    envVars:
      - key: RAPIDAPI_KEY
        sync: false
      - key: RAPIDAPI_HOST
        value: booking-com15.p.rapidapi.com
      - key: OPENCAGE_KEY
        sync: false
      - key: PORT
        value: "10000"
